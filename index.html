<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınav Takvimi & Bildirim</title>
    <style>
        :root { --primary: #4a90e2; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; display: flex; gap: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
        .exam-card { background: #fff; border-left: 5px solid var(--primary); padding: 15px; margin-top: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .exam-info b { display: block; font-size: 1.1em; }
        .kalan-gun { font-weight: bold; color: var(--danger); }
        .delete-btn { background: var(--danger); font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sınav Takvimi</h2>
    <div class="form-group">
        <input type="text" id="dersAdi" placeholder="Ders Adı">
        <input type="date" id="sinavTarihi">
        <button onclick="sinavEkle()">Ekle</button>
    </div>
    <div id="sinavListesi"></div>
</div>

<script>
    // Bildirim İzni İste (Raporundaki Notification API)
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    let sinavlar = JSON.parse(localStorage.getItem("sinavlar")) || [];

    function sinavEkle() {
        const ad = document.getElementById("dersAdi").value;
        const tarih = document.getElementById("sinavTarihi").value;

        if (ad && tarih) {
            sinavlar.push({ id: Date.now(), ad, tarih });
            localStorage.setItem("sinavlar", JSON.stringify(sinavlar));
            render();
            checkNotifications();
        }
    }

    function sil(id) {
        sinavlar = sinavlar.filter(s => s.id !== id);
        localStorage.setItem("sinavlar", JSON.stringify(sinavlar));
        render();
    }

    function render() {
        const liste = document.getElementById("sinavListesi");
        liste.innerHTML = "";
        
        sinavlar.sort((a,b) => new Date(a.tarih) - new Date(b.tarih)).forEach(s => {
            const gunFarki = Math.ceil((new Date(s.tarih) - new Date()) / (1000 * 60 * 60 * 24));
            const durum = gunFarki < 0 ? "Geçti" : `${gunFarki} gün kaldı`;

            liste.innerHTML += `
                <div class="exam-card">
                    <div class="exam-info">
                        <b>${s.ad}</b>
                        <span>${s.tarih}</span>
                    </div>
                    <div class="kalan-gun">${durum}</div>
                    <button class="delete-btn" onclick="sil(${s.id})">Sil</button>
                </div>
            `;
        });
    }

    function checkNotifications() {
        sinavlar.forEach(s => {
            const gunFarki = Math.ceil((new Date(s.tarih) - new Date()) / (1000 * 60 * 60 * 24));
            // Sınava 1 veya 3 gün kaldıysa bildirim gönder
            if ((gunFarki === 1 || gunFarki === 3) && Notification.permission === "granted") {
                new Notification("Sınav Hatırlatıcı", {
                    body: `${s.ad} sınavına sadece ${gunFarki} gün kaldı!`,
                    icon: "https://flaticon.com"
                });
            }
        });
    }

    // İlk açılışta listele ve kontrol et
    render();
    checkNotifications();
</script>

</body>
</html>
